<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña - USECIPOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at left bottom, #0a2463, #020817); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .glass-panel { background: rgba(14, 25, 60, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 380px; padding: 40px; text-align: center; }
        .input-glass { width: 100%; padding: 12px 15px 12px 40px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; margin-bottom: 20px; }
        .input-glass:focus { border-color: #ffea00; }
        .btn-primary { background: #0d47a1; color: white; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-primary:hover { background: #1565c0; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1 class="text-2xl font-black italic mb-2">CREAR CLAVE</h1>
        <div class="w-16 h-1 bg-[#ffea00] mx-auto mb-4 rounded"></div>
        
        <form action="/restablecer" method="POST" class="text-left mt-6">
            <label class="text-xs text-white/80 uppercase block mb-2 ml-1">Nueva Contraseña</label>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/50"></i>
                <input type="password" name="password" class="input-glass" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            
            <button type="submit" class="btn-primary">Guardar Contraseña</button>
        </form>
    </div>
</body>
</html>
