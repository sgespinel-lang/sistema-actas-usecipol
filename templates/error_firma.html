<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - USECIPOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 text-center border-t-8 border-red-600">
        <div class="mb-6">
            <i class="fas fa-file-signature text-red-600 text-6xl opacity-20 absolute -mt-4 ml-24"></i>
            <div class="bg-red-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto relative z-10">
                <i class="fas fa-lock text-red-600 text-3xl"></i>
            </div>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-2">{{ mensaje }}</h1>
        <p class="text-gray-600 mb-8 leading-relaxed">
            {{ subtitulo }}
        </p>

        <div class="border-t pt-6">
            <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-4">USECIPOL - Gestión Institucional</p>
            <div class="flex justify-center space-x-2">
                <span class="h-1.5 w-8 bg-red-600 rounded-full"></span>
                <span class="h-1.5 w-2 bg-gray-200 rounded-full"></span>
                <span class="h-1.5 w-2 bg-gray-200 rounded-full"></span>
            </div>
        </div>
    </div>
</body>
</html>
