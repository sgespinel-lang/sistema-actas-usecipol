<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USECIPOL - Acceso Institucional</title>
    <style>
        /* Reset básico y fuente global */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: radial-gradient(circle at left bottom, #0a2463, #020817); /* Fondo degradado azul oscuro */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Luces de fondo (bokeh) con toques amarillos */
        .background-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.2;
            background: radial-gradient(circle at 70% 30%, #ffea00, transparent), radial-gradient(circle at 40% 60%, #446aff, transparent);
        }

        /* Tarjeta de login con estilo de cristal esmerilado */
        .login-card {
            background: rgba(14, 25, 60, 0.4); 
            border-radius: 35px;
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            position: relative;
            width: 380px;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Encabezado */
        .card-header h1 {
            font-weight: black;
            font-style: italic;
            font-size: 32px;
            margin: 0 0 5px;
            color: white;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .yellow-underline {
            width: 60%;
            height: 3px;
            background-color: #ffea00; 
            margin: 0 auto 10px;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(255,234,0,0.5);
        }

        .card-header p {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* Pestañas */
        .tabs {
            margin: 20px 0 30px;
            position: relative;
            display: inline-flex;
            width: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            font-size: 14px;
            margin: 0 15px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            padding-bottom: 10px;
            transition: color 0.3s;
            position: relative;
        }

        .tab.active {
            color: white;
            font-weight: bold;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #ffea00; 
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(255,234,0,0.5);
        }

        /* Contenedor de Avatar */
        .avatar-container {
            margin-bottom: 25px;
        }

        .frosted-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.15);
            margin: 0 auto;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 35px;
            color: #fdfdfd;
            font-style: normal;
        }

        /* Formulario y campos de entrada */
        .login-form {
            text-align: left;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #ffea00;
            box-shadow: 0 0 8px rgba(255,234,0,0.2);
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: white;
            opacity: 0.7;
            font-style: normal;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        /* Evita el fondo blanco del autocompletado en navegadores */
        .input-wrapper input:-webkit-autofill {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px transparent inset !important;
            transition: background-color 5000s ease-in-out 0s !important;
        }

        /* Controles de fila inferior */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
        }

        .toggle-track {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 18px;
            background: rgba(14, 25, 60, 0.6);
            border-radius: 12px;
            margin-right: 8px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .toggle-circle {
            position: absolute;
            top: 1px;
            left: 2px;
            width: 14px;
            height: 14px;
            background-color: #ffea00;
            border-radius: 50%;
            transition: left 0.3s;
        }

        .toggle-track.active .toggle-circle {
            left: 12px;
        }

        .forgot-password {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #ffea00;
        }

        /* Botón de ingreso */
        .login-button {
            padding: 12px 25px;
            background-color: #0d47a1; 
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            display: block; 
            width: auto; 
            margin: 0 auto; 
            box-shadow: 0 4px 15px rgba(13, 71, 161, 0.5);
        }

        .login-button:hover {
            background-color: #1565c0;
            box-shadow: 0 6px 20px rgba(13, 71, 161, 0.7);
            transform: translateY(-2px);
        }

        /* Pie de página institucional */
        .institutional-footer {
            margin-top: 35px;
        }

        .institutional-footer p {
            font-size: 8px;
            color: rgba(180, 180, 180, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        /* Alertas de error de Flask */
        .alert-error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: #fca5a5;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="background-lights"></div>

    <div class="login-card">
        <header class="card-header">
            <h1>USECIPOL</h1>
            <div class="yellow-underline"></div>
            <p>GESTIÓN DE SEGURIDAD INSTITUCIONAL</p>
        </header>

		<nav class="tabs">
            <a href="/" class="tab active">Login</a>
            <a href="/registro" class="tab">Registro</a>
        </nav>

        <div class="avatar-container">
            <div class="frosted-circle">
                <i class="icon">👤</i> 
            </div>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert-error">
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="login-form">
            <div class="input-group">
                <label for="email">Correo Institucional</label>
                <div class="input-wrapper">
                    <i>✉️</i> 
                    <input type="email" id="email" name="email" placeholder="usuario@usecipol.edu.ec" required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i>🔒</i> 
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="control-row">
                <div class="remember-me">
                    <span class="toggle-track" onclick="this.classList.toggle('active')">
                        <span class="toggle-circle"></span>
                    </span>
                    Recordarme
                </div>
                <a href="/recuperar" class="forgot-password">¿Olvidó Contraseña?</a>
            </div>

            <button type="submit" class="login-button">INGRESAR</button>
        </form>

        <footer class="institutional-footer">
            <p>PROPIEDAD DE LA UNIDAD DE SEGURIDAD Y CONTROL INSTITUCIONAL POLICIAL</p>
        </footer>
    </div>
</body>
</html>
