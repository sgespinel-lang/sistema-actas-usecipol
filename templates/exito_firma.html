<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso - USECIPOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center border border-gray-100">
        
        <div class="mb-6 flex justify-center">
            <div class="bg-green-100 p-4 rounded-full">
                <i class="fas fa-check-circle text-green-500 text-6xl"></i>
            </div>
        </div>

        <h1 class="text-2xl font-black text-[#1a3275] mb-2 uppercase tracking-tight">
            ¡Registro Completado!
        </h1>
        
        <p class="text-gray-500 text-sm mb-8 leading-relaxed">
            Su asistencia y firma han sido vinculadas correctamente. Ya puede cerrar esta ventana de forma segura.
        </p>

        <div class="bg-blue-50 rounded-2xl p-4 mb-8 flex items-center justify-center gap-3">
            <i class="fas fa-user-shield text-blue-600"></i>
            <span class="text-[11px] font-bold text-blue-800 uppercase tracking-widest">Sesión de Invitado Finalizada</span>
        </div>

        <button onclick="cerrarVentanaSegura()" class="w-full bg-[#1a3275] hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
            <span>FINALIZAR REGISTRO</span>
        </button>

        <p class="mt-6 text-[10px] text-gray-400 uppercase font-medium">
            Sistema de Gestión Documental USECIPOL
        </p>
    </div>

    <script>
        function cerrarVentanaSegura() {
            // Intenta cerrar la pestaña (funciona si se abrió desde el QR)
            window.close();
            
            // Si el navegador bloquea window.close(), redirigimos a una página muerta 
            // o externa para que no puedan dar "atrás" y entrar al sistema.
            setTimeout(function() {
                window.location.href = "https://www.google.com"; 
            }, 500);
        }

        // Bloqueo adicional: Evitar que usen el botón "Atrás" del celular
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
