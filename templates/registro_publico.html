<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firma de Asistencia - USECIPOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-xl font-bold text-[#1a3275] mb-2 text-center">Registro de Asistencia</h2>
        <p class="text-xs text-center text-gray-500 mb-6 italic">{{ titulo }}</p>

        <form id="formFirma" action="/guardar_firma_asistente" method="POST" class="space-y-4">
            <input type="hidden" name="acta_id" value="{{ acta_id }}">
            <input type="hidden" name="firma_base64" id="firma_base64">

			<div class="mb-4">
				<label class="block text-gray-700 text-sm font-bold mb-2 uppercase">Cédula</label>
				<div class="relative flex items-center">
					<input type="text" id="cedula" name="cedula" placeholder="Ingrese identificación" 
						   class="shadow appearance-none border rounded w-full py-2 px-3 pr-10 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
					
					<button type="button" onclick="consultarCedula()" class="absolute right-3 text-gray-400 hover:text-blue-600 transition-colors">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
						</svg>
					</button>
				</div>
			</div>

            <div class="mb-4">
                <label class="block font-bold mb-1 text-sm">GRADO / CARGO</label>
                <input type="text" id="grado_cargo" name="grado_cargo" class="w-full border p-2 rounded bg-gray-50">
            </div>

            <div class="mb-4">
                <label class="block font-bold mb-1 text-sm">NOMBRES COMPLETOS</label>
                <input type="text" id="nombres_completos" name="nombres_completos" class="w-full border p-2 rounded bg-gray-50">
            </div>

            <div class="mb-4">
                <label class="block font-bold mb-1 text-sm">UNIDAD / CARGO</label>
                <input type="text" id="unidad" name="unidad" class="w-full border p-2 rounded bg-gray-50">
            </div>

            <div class="mb-4">
                <label class="block font-bold mb-1 text-sm">CORREO ELECTRÓNICO</label>
                <input type="email" id="correo" name="correo" class="w-full border p-2 rounded bg-gray-50">
            </div>

            <div class="mb-4 flex items-start gap-2 bg-blue-50 p-3 rounded border border-blue-200">
                <input type="checkbox" name="terminos" id="terminos" class="mt-1" required>
                <label for="terminos" class="text-[10px] text-blue-900 leading-tight">
                    Acepto que mis datos personales sean utilizados para la generación de este acta oficial y autorizo el envío del documento a mi correo electrónico registrado.
                </label>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">FIRMA DIGITAL (Use su dedo o mouse)</label>
                <div class="border-2 border-gray-200 rounded-lg bg-white">
                    <canvas id="canvas_firma" class="w-full h-40 touch-none" style="cursor: crosshair;"></canvas>
                </div>
                <button type="button" id="btn_limpiar" class="text-[10px] text-red-500 font-bold mt-1 uppercase">Limpiar Firma</button>
            </div>

            <button type="submit" class="w-full bg-[#1a3275] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-900 transition-colors">
                ENVIAR REGISTRO Y FIRMA
            </button>
        </form>
    </div>

    <script>
        // --- LÓGICA DE LA FIRMA ---
        const canvas = document.getElementById('canvas_firma');
        const signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgb(255, 255, 255)'
        });

        // Limpiar firma
        document.getElementById('btn_limpiar').addEventListener('click', () => {
            signaturePad.clear();
        });

        // Al enviar el formulario
        document.getElementById('formFirma').onsubmit = function(e) {
            if (signaturePad.isEmpty()) {
                alert("Por favor, firme antes de enviar.");
                return false;
            }
            // Guardamos la imagen en el input oculto
            document.getElementById('firma_base64').value = signaturePad.toDataURL();
        };

        // Ajuste de tamaño del canvas
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        // --- NUEVA FUNCIÓN DE BÚSQUEDA CON LA LUPA ---
function consultarCedula() {
    const cedulaInput = document.getElementById('cedula');
    if (!cedulaInput) return;
    
    const cedula = cedulaInput.value.trim();
    
    if (cedula.length < 5) {
        alert("Por favor, ingrese un número de cédula válido.");
        return;
    }

    console.log("🔍 Buscando en USECIPOL:", cedula);

    fetch(`/api/obtener_perfil/${cedula}`)
        .then(response => {
            if (!response.ok) throw new Error("Error en servidor");
            return response.json();
        })
        .then(data => {
            if (data.existe) {
                // Llenamos los campos automáticamente con la información de Supabase
                if(document.getElementById('nombres_completos')) document.getElementById('nombres_completos').value = data.perfil.nombres_completos || "";
                if(document.getElementById('grado_cargo')) document.getElementById('grado_cargo').value = data.perfil.grado_cargo || "";
                if(document.getElementById('unidad')) document.getElementById('unidad').value = data.perfil.unidad || "";
                if(document.getElementById('correo')) document.getElementById('correo').value = data.perfil.correo || "";
                console.log("✅ Datos cargados con éxito");
            } else {
                alert("La cédula no consta en la base de datos.");
            }
        })
        .catch(err => {
            console.error("❌ Error de conexión:", err);
            alert("No se pudo conectar con el servicio de búsqueda.");
        });
}
        // Se activa mientras escribes
        document.getElementById('cedula').addEventListener('input', buscarDatos);
		
		
    </script>
</body>
</html>
